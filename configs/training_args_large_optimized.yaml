# Whisper-Large-V3 LoRA微调配置文件（针对小数据集优化）
# 专门针对168样本的中文方言ASR任务进行优化

# 数据配置
data:
  excel_path: "/data/AD_predict/data/raw/audio/老人视频信息_final_complete_20251016_214400.xlsx"
  audio_base_dir: "/data/AD_predict/data/raw/audio/elderly_audios"
  processed_data_dir: "/data/AD_predict/processed_data"
  train_split_ratio: 0.9
  
  # 数据增强配置 - 必须启用以增加训练样本
  augmentation:
    enable: true
    min_samples_threshold: 10
    augmentation_factor: 4  # 增强倍数
    
# 模型配置
model:
  name: "openai/whisper-large-v3"  # 使用已缓存的模型
  language: "zh"
  task: "transcribe"
  
# LoRA配置 - 针对小数据集优化
lora:
  r: 8  # ✨ 降低秩（从16到8），减少可训练参数，降低过拟合风险
  lora_alpha: 16  # ✨ 相应调整alpha（保持alpha/r=2的比例）
  target_modules: ["q_proj", "v_proj"]
  lora_dropout: 0.15  # ✨ 增大dropout（从0.05到0.15），增强正则化
  bias: "none"
  
# 训练配置 - 针对小数据集优化
training:
  output_dir: "/data/AD_predict/whisper_large_v3_optimized"  # ✨ 新的输出目录
  num_train_epochs: 20  # ✨ 增加epoch（因为减少了过拟合风险）
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16  # 有效batch=16
  learning_rate: 3.0e-5  # ✨ 降低学习率（从1e-4到3e-5），更稳定的训练
  warmup_steps: 50  # ✨ 减少warmup（数据少不需要太长warmup）
  
  # 优化器 - 增强正则化
  optim: "adamw_torch"
  weight_decay: 0.05  # ✨ 增大权重衰减（从0.01到0.05），强正则化
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  max_grad_norm: 0.5  # ✨ 添加梯度裁剪，防止梯度爆炸
  
  # 保存和评估 - 更频繁监控
  evaluation_strategy: "steps"
  eval_steps: 50  # ✨ 更频繁评估（从500到50），及时发现过拟合
  save_strategy: "steps"
  save_steps: 50
  save_total_limit: 5  # ✨ 保存更多checkpoint
  load_best_model_at_end: true
  metric_for_best_model: "wer"
  greater_is_better: false
  
  # Early stopping - 自动停止训练
  early_stopping_patience: 5  # ✨ 如果5次评估WER没有改善则停止
  early_stopping_threshold: 0.01  # 改善阈值
  
  # 日志
  logging_steps: 10  # ✨ 更频繁日志
  logging_dir: "/data/AD_predict/logs_large_optimized"
  report_to: ["tensorboard"]
  
  # 其他
  fp16: true
  dataloader_num_workers: 0
  remove_unused_columns: false
  predict_with_generate: true
  generation_max_length: 225
  
  # 数据不均衡处理
  use_weighted_sampler: false  # 依赖数据增强

# 方言标签配置
dialects:
  labels:
    - beijing_mandarin
    - jianghuai_mandarin
    - zhongyuan_mandarin
    - dongbei_mandarin
    - jin_dialect
    - lanyin_mandarin
    - wu_dialect
    - xinan_mandarin
    - min_dialect
    - yue_dialect
    - tibetan_dialect
    - gan_dialect

# 优化说明
optimization_notes: |
  针对小数据集（168样本）的优化策略：
  1. 降低LoRA秩 (r=8): 减少可训练参数，降低过拟合
  2. 增大dropout (0.15): 更强的正则化
  3. 增大weight decay (0.05): 防止权重过大
  4. 降低学习率 (3e-5): 更平滑的优化
  5. 更频繁评估 (每50步): 及时监控训练状态
  6. Early stopping: 自动停止训练避免过拟合
  7. 梯度裁剪: 稳定训练过程

