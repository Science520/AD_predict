# 实验3: 更大batch size配置
# 假设：更大的有效batch可能提供更稳定的梯度

data:
  excel_path: "/data/AD_predict/data/raw/audio/老人视频信息_final_complete_20251016_214400.xlsx"
  audio_base_dir: "/data/AD_predict/data/raw/audio/elderly_audios"
  processed_data_dir: "/data/AD_predict/processed_data"
  train_split_ratio: 0.9
  augmentation:
    enable: true
    min_samples_threshold: 200
    augmentation_factor: 4

model:
  name: "openai/whisper-medium"
  language: "zh"
  task: "transcribe"

lora:
  r: 16
  lora_alpha: 32
  target_modules: ["q_proj", "v_proj"]
  lora_dropout: 0.05
  bias: "none"

training:
  output_dir: "/data/AD_predict/exp3_large_batch"
  num_train_epochs: 20
  per_device_train_batch_size: 2  # ⬆️ 从1增加到2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8  # ⬇️ 从16降到8（保持有效batch=16）
  learning_rate: 3.0e-5
  warmup_steps: 50
  optim: "adamw_torch"
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  evaluation_strategy: "steps"
  eval_steps: 50
  save_strategy: "steps"
  save_steps: 50
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "wer"
  greater_is_better: false
  logging_steps: 10
  logging_dir: "/data/AD_predict/logs_exp3"
  report_to: ["tensorboard"]
  fp16: true
  gradient_checkpointing: true
  dataloader_num_workers: 0
  dataloader_pin_memory: false
  remove_unused_columns: false
  predict_with_generate: true
  generation_max_length: 225
  local_rank: -1
  ddp_find_unused_parameters: false
  use_weighted_sampler: false

dialects:
  labels:
    - beijing_mandarin
    - jianghuai_mandarin
    - zhongyuan_mandarin
    - dongbei_mandarin
    - jin_dialect
    - lanyin_mandarin
    - wu_dialect
    - xinan_mandarin
    - min_dialect
    - yue_dialect
    - tibetan_dialect
    - gan_dialect

