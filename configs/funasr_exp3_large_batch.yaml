# FunASR实验3: 大batch配置
# 测试更大batch对训练稳定性的影响

data:
  excel_path: "/data/AD_predict/data/raw/audio/老人视频信息_final_complete_20251016_214400.xlsx"
  audio_base_dir: "/data/AD_predict/data/raw/audio/elderly_audios"
  processed_data_dir: "/data/AD_predict/processed_data"
  train_split_ratio: 0.9
  augmentation:
    enable: true
    min_samples_threshold: 200
    augmentation_factor: 4

model:
  name: "damo/speech_paraformer-large_asr_nat-zh-cn-16k-common-vocab8404-pytorch"
  language: "zh"
  task: "transcribe"

lora:
  r: 16
  lora_alpha: 32
  target_modules: ["query", "value"]
  lora_dropout: 0.05
  bias: "none"

training:
  output_dir: "/data/AD_predict/funasr_exp3_large_batch"
  num_train_epochs: 20
  per_device_train_batch_size: 4  # 更大的batch
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 3.0e-5
  warmup_steps: 50
  optim: "adamw_torch"
  weight_decay: 0.01
  evaluation_strategy: "steps"
  eval_steps: 50
  save_strategy: "steps"
  save_steps: 50
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "wer"
  greater_is_better: false
  logging_steps: 10
  logging_dir: "/data/AD_predict/logs_funasr_exp3"
  report_to: ["tensorboard"]
  fp16: true
  gradient_checkpointing: true
  dataloader_num_workers: 0
  remove_unused_columns: false
  predict_with_generate: true
  generation_max_length: 225
  local_rank: -1

dialects:
  labels:
    - beijing_mandarin
    - jianghuai_mandarin
    - zhongyuan_mandarin
    - dongbei_mandarin
    - jin_dialect
    - lanyin_mandarin
    - wu_dialect
    - xinan_mandarin
    - min_dialect
    - yue_dialect
    - tibetan_dialect
    - gan_dialect

